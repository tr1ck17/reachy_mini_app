<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reachy Mini — CPS Launcher</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0a0f;
      --surface:    #12121a;
      --border:     #1e1e2e;
      --accent:     #7b61ff;
      --accent-dim: #3d2f99;
      --green:      #00e5a0;
      --text:       #e8e8f0;
      --muted:      #6b6b80;
      --danger:     #ff5f6b;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    /* ── Background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(123,97,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(123,97,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Glow orb ── */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(123,97,255,0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .wrapper {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 2.5rem;
    }

    /* ── Header ── */
    .header {
      text-align: center;
    }

    .robot-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 1rem;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 0.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ── Session card ── */
    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem 2rem;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .session-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .session-key {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .session-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      text-align: right;
    }

    .stage-badge {
      display: inline-block;
      padding: 0.2rem 0.75rem;
      border-radius: 999px;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(123,97,255,0.15);
      color: var(--accent);
      border: 1px solid var(--accent-dim);
    }

    .no-session {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      padding: 0.5rem 0;
    }

    /* ── Buttons ── */
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 480px;
    }

    .btn {
      width: 100%;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      letter-spacing: 0.01em;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.2s;
    }

    .btn:hover::after  { background: rgba(255,255,255,0.06); }
    .btn:active::after { background: rgba(255,255,255,0.12); }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-continue {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 30px rgba(123,97,255,0.35);
    }

    .btn-continue:hover:not(:disabled) {
      box-shadow: 0 0 45px rgba(123,97,255,0.55);
      transform: translateY(-1px);
    }

    .btn-new {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-new:hover:not(:disabled) {
      border-color: var(--muted);
      transform: translateY(-1px);
    }

    /* ── Status message ── */
    .status {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      text-align: center;
      min-height: 1.2em;
      transition: all 0.3s ease;
      color: var(--muted);
    }

    .status.success { color: var(--green); }
    .status.error   { color: var(--danger); }

    /* ── Loading spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── Footer ── */
    .footer {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      opacity: 0.5;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <div class="header">
      <span class="robot-icon">🤖</span>
      <h1 class="title">Reachy Mini</h1>
      <p class="subtitle">CPS Facilitator — Session Launcher</p>
    </div>

    <div class="session-card" id="sessionCard">
      <span class="card-label">Last Session</span>
      <div id="sessionInfo" class="no-session">Loading...</div>
    </div>

    <div class="buttons">
      <button class="btn btn-continue" id="btnContinue" onclick="launch('continue')" disabled>
        Continue Previous Session
      </button>
      <button class="btn btn-new" id="btnNew" onclick="launch('new')">
        ✦ Start New Session
      </button>
    </div>

    <p class="status" id="status"></p>

    <p class="footer">Make sure the Reachy daemon is running before launching.</p>

  </div>

  <script>
    const btnContinue = document.getElementById('btnContinue');
    const btnNew      = document.getElementById('btnNew');
    const statusEl    = document.getElementById('status');
    const infoEl      = document.getElementById('sessionInfo');

    // ── Load session info ─────────────────────────────────────────────────────

    async function loadSessionInfo() {
      try {
        const res  = await fetch('/api/session-info');
        const data = await res.json();

        if (data.has_previous) {
          infoEl.innerHTML = `
            <div class="session-row">
              <span class="session-key">Last active</span>
              <span class="session-value">${data.last_session}</span>
            </div>
            <div class="session-row">
              <span class="session-key">Sessions stored</span>
              <span class="session-value">${data.session_count}</span>
            </div>
            <div class="session-row">
              <span class="session-key">CPS stage</span>
              <span class="session-value">
                <span class="stage-badge">${data.current_stage}</span>
              </span>
            </div>
          `;
          btnContinue.disabled = false;
          btnContinue.textContent = `▶ Continue — ${data.current_stage} Stage`;
        } else {
          infoEl.innerHTML = '<span class="no-session">No previous session found</span>';
          btnContinue.disabled = true;
        }
      } catch (e) {
        infoEl.innerHTML = '<span class="no-session">Could not load session data</span>';
        console.error(e);
      }
    }

    // ── Launch ────────────────────────────────────────────────────────────────

    async function launch(mode) {
      setLoading(true);
      setStatus('', '');

      try {
        const res  = await fetch('/api/launch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode })
        });
        const data = await res.json();

        if (data.status === 'launched') {
          setStatus(
            mode === 'new'
              ? '✓ New session started — check your terminal!'
              : '✓ Continuing previous session — check your terminal!',
            'success'
          );
        } else {
          setStatus(`✗ ${data.message || 'Launch failed.'}`, 'error');
        }
      } catch (e) {
        setStatus('✗ Could not reach launcher server.', 'error');
        console.error(e);
      } finally {
        setLoading(false);
      }
    }

    // ── Helpers ───────────────────────────────────────────────────────────────

    function setLoading(loading) {
      btnContinue.disabled = loading;
      btnNew.disabled      = loading;

      if (loading) {
        btnNew.innerHTML = '<div class="spinner"></div> Launching...';
      } else {
        btnNew.innerHTML = '✦ Start New Session';
        loadSessionInfo(); // refresh info after launch
      }
    }

    function setStatus(msg, type) {
      statusEl.textContent  = msg;
      statusEl.className    = `status ${type}`;
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    loadSessionInfo();
  </script>
</body>
</html>
